<svg width="240" height="240" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">Ko and Ko Workshop logo</title>
  <desc id="logoDesc">Circular logo with Ko and Ko initials</desc>
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f7ff" />
      <stop offset="100%" stop-color="#cdd6f4" />
    </linearGradient>
    <linearGradient id="fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2030" />
      <stop offset="100%" stop-color="#0f141f" />
    </linearGradient>
  </defs>

  <circle cx="120" cy="120" r="112" fill="none" stroke="url(#ring)" stroke-width="8" />
  <circle cx="120" cy="120" r="96" fill="url(#fill)" stroke="#f5f7ff" stroke-opacity="0.16" />

  <text
    x="120"
    y="112"
    text-anchor="middle"
    fill="#f5f7ff"
    font-size="46"
    font-family="Trebuchet MS, Segoe UI, sans-serif"
    font-weight="700"
  >
    Ko&amp;Ko
  </text>
  <text
    x="120"
    y="146"
    text-anchor="middle"
    fill="#d2daf8"
    font-size="16"
    letter-spacing="1"
    font-family="Trebuchet MS, Segoe UI, sans-serif"
  >
    WORKSHOP
  </text>

  <path
    d="M42 188 Q120 222 198 188"
    fill="none"
    stroke="#f5f7ff"
    stroke-opacity="0.8"
    stroke-width="4"
    stroke-linecap="round"
  />
</svg>
